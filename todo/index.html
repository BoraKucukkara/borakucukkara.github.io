<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>todo.do</title>
    <script src="app.js"></script>
    <link rel="stylesheet" href="app.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <script src="js/bootstrap.js"></script>
    <script src="https://kit.fontawesome.com/7ed19c3a98.js" crossorigin="anonymous"></script>
</head>
<body onload="onLoadFocus()">
<div class="container">
    <div class="row justify-content-md-center">
        <div class="col">
            <h1 class="display-1 text-success">todo.do</h1>
            <div class="card shadow-lg">
                <!-- Counters -->
                <div class="card-header">

                    <div class="input-group">
                        <input id="newtask" aria-describedby="basic-addon1" onsubmit="false" type="text"
                               class="form-control form-control-lg">
                        <button onclick="add()" type="button" class="btn btn-success">+</button>
                    </div>
                    <div class="row mt-2">
                        <div class="col-12">
                            <div class="progress">
                                <div id="loading"
                                     class="progress-bar bg-success progress-bar-striped progress-bar-animated"
                                     role="progressbar" style="width: 0%;" aria-valuemin="0" aria-valuemax="100"></div>
                            </div>
                        </div>
                    </div>

                </div>
                <!-- TASKS -->
                <div class="card-body">
                    <span class="text-success lead" id="bodytext">Welcome. Add your first task here</span>

                    <ul class="list-group list-group-flush fs-5 tasks" id="tasks">
                    </ul>
                </div>
                <!-- FORM -->
                <div class="card-footer">

                    <div class="row w-100">
                        <div class="col-4">
                            <h6 class="d-inline">Tasks <span class="badge btn-secondary" id="activebox">0</span></h6>
                        </div>
                        <div class="col-4">
                            <h6 class="d-inline">Done <span class="badge btn-success" id="passivebox">0</span>
                            </h6>
                        </div>
                        <div class="col-4">
                            Clear All
                            <button class="btn btn-sm btn-close" onclick="clearall()"></button>
                        </div>
                    </div>

                    <!--<span class="small" id="idbox">aask jdfhasd</span>-->

                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
